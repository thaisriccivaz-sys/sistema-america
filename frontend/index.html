<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>América Rental - Gestão de Colaboradores</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <h2>AMÉRICA RENTAL</h2>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active" data-target="dashboard">
                    <i class="ph ph-squares-four"></i> Dashboard
                </a>
                <a href="#" class="nav-item" data-target="colaboradores">
                    <i class="ph ph-users"></i> Colaboradores
                </a>
                <a href="#" class="nav-item" data-target="config">
                    <i class="ph ph-gear"></i> Configurações
                </a>
            </nav>
            <div style="margin-top: auto;">
                <button class="btn btn-secondary" style="width: 100%; border: 1px solid rgba(255,255,255,0.1);">
                    <i class="ph ph-sign-out"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-wrapper">
            
            <!-- View: Dashboard -->
            <section id="view-dashboard" class="content-view active">
                <div class="header">
                    <h1>Dashboard</h1>
                </div>
                
                <div class="card" style="margin-bottom: 2rem;">
                    <div style="display: flex; gap: 2rem; align-items: center;">
                        <div style="flex: 1; padding: 1.5rem; text-align: center; border-right: 1px solid var(--border);">
                            <span style="font-size: 0.875rem; color: var(--secondary); font-weight: 600;">Total Colaboradores</span>
                            <h2 id="stat-total" style="font-size: 2.5rem; color: var(--primary);">0</h2>
                        </div>
                        <div style="flex: 1; padding: 1.5rem; text-align: center;">
                            <span style="font-size: 0.875rem; color: var(--secondary); font-weight: 600;">Ativos</span>
                            <h2 id="stat-ativos" style="font-size: 2.5rem; color: var(--success);">0</h2>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h3 style="font-weight: 700;">Cadastro de Colaborador</h3>
                    </div>
                    
                    <form id="form-colaborador" class="form-grid">
                        <div class="input-group">
                            <label>Nome Completo</label>
                            <input type="text" id="ipt-nome" placeholder="Ex: João Silva" required>
                        </div>
                        <div class="input-group">
                            <label>CPF</label>
                            <input type="text" id="ipt-cpf" placeholder="000.000.000-00" required>
                        </div>
                        <div class="input-group">
                            <label>Cargo</label>
                            <input type="text" id="ipt-cargo" placeholder="Ex: Motorista">
                        </div>
                        <div class="input-group">
                            <label>Data de Admissão</label>
                            <input type="date" id="ipt-admissao">
                        </div>
                        <div class="input-group">
                            <label>Status</label>
                            <select id="ipt-status">
                                <option value="Ativo">Ativo</option>
                                <option value="Férias">Férias</option>
                                <option value="Desligado">Desligado</option>
                            </select>
                        </div>
                        <div class="input-group" style="justify-content: flex-end; padding-top: 1.5rem;">
                            <button type="submit" class="btn btn-primary" style="padding: 1rem 2rem;">
                                <i class="ph ph-plus-circle"></i> Cadastrar
                            </button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- View: Colaboradores -->
            <section id="view-colaboradores" class="content-view">
                <div class="header">
                    <h1>Colaboradores</h1>
                    <div style="display: flex; gap: 1rem;">
                        <input type="text" id="ipt-search" placeholder="Buscar por nome..." style="width: 300px;">
                    </div>
                </div>

                <div class="card">
                    <div style="overflow-x: auto;">
                        <table id="table-colaboradores">
                            <thead>
                                <tr>
                                    <th>Nome</th>
                                    <th>CPF</th>
                                    <th>Cargo</th>
                                    <th>Admissão</th>
                                    <th>Status</th>
                                    <th style="text-align: right;">Ações</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Dinâmico via JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Modal Documentos -->
    <div id="modal-documentos" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="margin-bottom: 2rem;">Documentos de ...</h2>
            
            <form id="form-upload" style="margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px dashed var(--border);">
                <input type="hidden" id="modal-colab-id">
                <div class="form-grid">
                    <div class="input-group">
                        <label>Tipo de Documento</label>
                        <select id="ipt-doc-tipo">
                            <option value="ID/CPF">ID/CPF</option>
                            <option value="ASO">ASO</option>
                            <option value="Contrato">Contrato</option>
                            <option value="EPI">EPI</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Arquivo (PDF)</label>
                        <input type="file" id="ipt-doc-file" accept=".pdf">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="margin-top: 1.5rem; width: 100%;">
                    <i class="ph ph-upload-simple"></i> Enviar Documento
                </button>
            </form>

            <div id="list-documentos" style="display: flex; flex-direction: column; gap: 0.75rem;">
                <!-- Lista de Docs -->
            </div>

            <button onclick="closeModal()" class="btn btn-secondary" style="margin-top: 2rem; width: 100%;">Fechar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
